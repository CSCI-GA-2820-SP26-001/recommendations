apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendations
  labels:
    app: recommendations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendations
  template:
    metadata:
      labels:
        app: recommendations
    spec:
      containers:
        - name: recommendations
          image: cluster-registry:5000/petshop:1.0
          ports:
            - containerPort: 8080
          env:
            - name: FLASK_RUN_PORT
              value: "8080"
